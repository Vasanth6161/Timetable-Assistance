{% extends "base.html" %}
{% block title %}Sign Up - Timetable Assistant{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="brand">📅 Timetable Assistant</h1>
        <p class="subtitle">Create your account</p>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required autofocus>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>

            <div class="row-fields">
                <div>
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" placeholder="e.g. CSE">
                </div>
                <div>
                    <label for="semester">Semester</label>
                    <input type="text" id="semester" name="semester" placeholder="e.g. 5">
                </div>
                <div>
                    <label for="section">Section</label>
                    <input type="text" id="section" name="section" placeholder="e.g. A">
                </div>
            </div>

            <label for="role">I am a</label>
            <select id="role" name="role">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <p class="switch-link">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
</div>
{% endblock %}
