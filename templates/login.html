{% extends "base.html" %}
{% block title %}Login - Timetable Assistant{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="brand">📅 Timetable Assistant</h1>
        <p class="subtitle">Log in to view your schedule</p>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>

            <button type="submit" class="btn-primary">Log In</button>
        </form>

        <p class="switch-link">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>

        <div class="demo-hint">
            <strong>Demo account:</strong><br>
            Email: <code>demo@student.com</code><br>
            Password: <code>demo1234</code>
        </div>
    </div>
</div>
{% endblock %}
